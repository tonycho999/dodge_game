<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미사일 피하기 게임</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <div id="score-board">점수: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <div id="game-over" class="hidden">
            <h2>게임 오버!</h2>
            <p>최종 점수: <span id="final-score">0</span>점</p>
            <button id="restart-btn">다시 하기</button>
        </div>
    </div>

    <script src="js/player.js"></script>
    <script src="js/missile.js"></script>
    <script src="js/asteroid.js"></script> <!-- 운석 스크립트 추가됨 -->
    <script src="js/main.js"></script>
</body>
</html>
